<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <!-- Green circle (top-left, XQuery) -->
  <circle cx="155" cy="130" r="110" fill="#90EE90" opacity="0.6"/>
  <!-- Yellow circle (top-right, XPointer, XLink) -->
  <circle cx="265" cy="130" r="110" fill="#FFD700" opacity="0.5"/>
  <!-- Red circle (bottom, XSLT) -->
  <circle cx="210" cy="220" r="110" fill="#FF6B6B" opacity="0.5"/>

  <!-- XQuery in green only (top-left) -->
  <text x="75" y="90" font-family="Arial" font-size="15" fill="#333" font-weight="bold">XQuery</text>

  <!-- XPointer in green-yellow overlap (top-center) -->
  <text x="175" y="80" font-family="Arial" font-size="15" fill="#333" font-weight="bold">XPointer</text>

  <!-- XLink in yellow only (top-right) -->
  <text x="300" y="90" font-family="Arial" font-size="15" fill="#333" font-weight="bold">XLink</text>

  <!-- XPath in center intersection of all three -->
  <text x="185" y="170" font-family="Arial" font-size="17" fill="#555" font-weight="bold">XPath</text>

  <!-- XSLT in red only (bottom) -->
  <text x="185" y="280" font-family="Arial" font-size="17" fill="#333" font-weight="bold">XSLT</text>
</svg>
